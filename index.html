 <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Music</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#2b0050,#0d001a);
color:white;
}

.header{
display:flex;
justify-content:space-between;
padding:15px;
font-size:24px;
font-weight:bold;
color:#ff4dff;
}

.search{
margin:15px;
}
.search input{
width:100%;
padding:14px;
border-radius:30px;
border:none;
background:#3b0066;
color:white;
}

.section{
padding:10px;
}

.cards{
display:flex;
flex-wrap:wrap;
}

.card{
width:48%;
margin:1%;
background:#4b0082;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}
.card img{
width:100%;
}
.card p{
padding:8px;
font-size:13px;
}

.loadbtn{
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:#ff00cc;
color:white;
margin-top:10px;
}

.player{
position:fixed;
bottom:0;
width:100%;
background:#1a0033;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.player img{
width:50px;
height:50px;
border-radius:50%;
}

.controls button{
background:#ff00cc;
border:none;
padding:10px;
border-radius:50%;
margin:5px;
color:white;
}

</style>
</head>

<body>

<div class="header">
  <div>D-Music</div>
  <div>⚙️</div>
</div>

<div class="search">
  <input id="searchInput" placeholder="Search music..." onkeyup="autoSearch()">
</div>

<div class="section">
  <h3>Trending Now</h3>
  <div class="cards" id="results"></div>
</div>

<div class="player">
  <img id="thumb" src="">
  <div id="title">Select a song</div>
  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="playPause()">⏯</button>
    <button onclick="next()">⏭</button>
  </div>
</div>

<div id="player"></div>

<script>

const API_KEY="AIzaSyAfJIHop06R94612CGPmMiTByy5hUarL1M";

let player;
let ready=false;
let playlist=[];
let index=0;
let nextPageToken="";
let currentQuery="";

function onYouTubeIframeAPIReady(){
  player=new YT.Player('player',{
    height:'0',
    width:'0',
    videoId:'',
    events:{
      onReady:()=>{ready=true;}
    }
  });
}

function autoSearch(){
  let q=document.getElementById("searchInput").value;
  if(q.length<3) return;

  currentQuery=q;
  nextPageToken="";
  playlist=[];
  document.getElementById("results").innerHTML="";

  fetchVideos();
}

function fetchVideos(){
  let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${currentQuery}&maxResults=20&key=${API_KEY}`;

  if(nextPageToken){
    url+=`&pageToken=${nextPageToken}`;
  }

  fetch(url)
  .then(r=>r.json())
  .then(data=>{

    nextPageToken=data.nextPageToken;

    let results=document.getElementById("results");

    data.items.forEach((v)=>{
      playlist.push(v);

      let div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <img src="${v.snippet.thumbnails.medium.url}">
        <p>${v.snippet.title}</p>
      `;

      div.onclick=()=>{
        index=playlist.indexOf(v);
        playCurrent();
      };

      results.appendChild(div);
    });

    // Load More Button
    let oldBtn=document.getElementById("loadMoreBtn");
    if(oldBtn) oldBtn.remove();

    if(nextPageToken){
      let btn=document.createElement("button");
      btn.id="loadMoreBtn";
      btn.className="loadbtn";
      btn.innerText="Load More";
      btn.onclick=fetchVideos;
      results.appendChild(btn);
    }

  });
}

function playCurrent(){
  if(!ready) return;

  let v=playlist[index];
  player.loadVideoById(v.id.videoId);

  document.getElementById("title").innerText=v.snippet.title;
  document.getElementById("thumb").src=v.snippet.thumbnails.medium.url;
}

function next(){
  if(index<playlist.length-1){
    index++;
    playCurrent();
  }
}

function prev(){
  if(index>0){
    index--;
    playCurrent();
  }
}

function playPause(){
  let state=player.getPlayerState();
  if(state==1){
    player.pauseVideo();
  }else{
    player.playVideo();
  }
}

</script>

</body>
</html>
