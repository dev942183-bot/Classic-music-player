 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Music Home Screen</title>
    <style>
        :root {
            --bg-color: #12002b;
            --card-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #bc13fe;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #1a0033 0%, #000000 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .phone-container {
            width: 360px;
            background: var(--bg-color);
            border: 8px solid #333;
            border-radius: 40px;
            overflow-y: auto;
            position: relative;
            padding-bottom: 80px;
        }

        /* Header Area */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(to right, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Image */
        .hero {
            width: 90%;
            height: 150px;
            margin: 0 auto;
            background: url('https://via.placeholder.com/400x200/5000a0/ffffff?text=D-Music+Vibes') no-repeat center;
            background-size: cover;
            border-radius: 20px;
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* Search Bar */
        .search-bar {
            margin: 20px;
            padding: 10px 15px;
            background: var(--card-bg);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Categories Section */
        .section-title { padding: 0 20px; font-size: 18px; }

        .trending-grid {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
        }

        .trend-card {
            min-width: 120px;
            height: 150px;
            background: #2a0055;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        /* Bottom Player Bar */
        .player-bar {
            position: absolute;
            bottom: 60px;
            width: 90%;
            left: 5%;
            background: rgba(40, 0, 80, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-art {
            width: 40px;
            height: 40px;
            background: gold;
            border-radius: 50%;
        }

        /* Bottom Navigation */
        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <div class="logo">D-Music</div>
        <div class="settings">⚙️</div>
    </div>

    <div class="hero"></div>

    <div class="search-bar">🔍 Search music...</div>

    <h3 class="section-title">Trending Now</h3>
    <div class="trending-grid">
        <div class="trend-card"></div>
        <div class="trend-card"></div>
        <div class="trend-card"></div>
    </div>

    <div class="player-bar">
        <div class="mini-art"></div>
        <div style="flex:1">
            <div style="font-size: 12px; font-weight: bold;">Summer Vibes</div>
            <div style="font-size: 10px; color: #bbb;">DJ Pulse</div>
        </div>
        <div class="controls">⏸ ⏭</div>
    </div>

    <div class="nav-bar">
        <span>🏠</span>
        <span>🎵</span>
        <span>❤️</span>
        <span>👤</span>
    </div>
</div>

</body>
</html>
