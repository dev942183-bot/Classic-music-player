 <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Music</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#2b0050,#0d001a);
color:white;
}

.header{
display:flex;
justify-content:space-between;
padding:15px;
font-size:24px;
font-weight:bold;
color:#ff4dff;
}

.search{
margin:15px;
}
.search input{
width:100%;
padding:14px;
border-radius:30px;
border:none;
background:#3b0066;
color:white;
}

.section{
padding:10px;
}

.cards{
display:flex;
overflow-x:auto;
}

.card{
min-width:160px;
margin-right:10px;
background:#4b0082;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}
.card img{
width:100%;
}
.card p{
padding:8px;
font-size:14px;
}

.player{
position:fixed;
bottom:0;
width:100%;
background:#1a0033;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.player img{
width:50px;
height:50px;
border-radius:50%;
}

.controls button{
background:#ff00cc;
border:none;
padding:10px;
border-radius:50%;
margin:5px;
color:white;
}

</style>
</head>

<body>

<div class="header">
  <div>D-Music</div>
  <div>⚙️</div>
</div>

<div class="search">
  <input id="searchInput" placeholder="Search music..." onkeyup="autoSearch()">
</div>

<div class="section">
  <h3>Trending Now</h3>
  <div class="cards" id="results"></div>
</div>

<div class="player">
  <img id="thumb" src="">
  <div id="title">Select a song</div>
  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="playPause()">⏯</button>
    <button onclick="next()">⏭</button>
  </div>
</div>

<div id="player"></div>

<script>

const API_KEY="AIzaSyAfJIHop06R94612CGPmMiTByy5hUarL1M";

let player;
let ready=false;
let playlist=[];
let index=0;

function onYouTubeIframeAPIReady(){
  player=new YT.Player('player',{
    height:'0',
    width:'0',
    videoId:'',
    events:{
      onReady:()=>{ready=true;}
    }
  });
}

function autoSearch(){
  let q=document.getElementById("searchInput").value;
  if(q.length<3) return;

  fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${q}&maxResults=10&key=${API_KEY}`)
  .then(r=>r.json())
  .then(data=>{

    playlist=data.items;

    let results=document.getElementById("results");
    results.innerHTML="";

    data.items.forEach((v,i)=>{
      let id=v.id.videoId;
      let title=v.snippet.title;
      let img=v.snippet.thumbnails.medium.url;

      let div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <img src="${img}">
        <p>${title}</p>
      `;

      div.onclick=()=>{
        index=i;
        playCurrent();
      };

      results.appendChild(div);
    });

  });
}

function playCurrent(){
  if(!ready) return;

  let v=playlist[index];
  let id=v.id.videoId;

  player.loadVideoById(id);

  document.getElementById("title").innerText=v.snippet.title;
  document.getElementById("thumb").src=v.snippet.thumbnails.medium.url;
}

function next(){
  if(index<playlist.length-1){
    index++;
    playCurrent();
  }
}

function prev(){
  if(index>0){
    index--;
    playCurrent();
  }
}

function playPause(){
  let state=player.getPlayerState();
  if(state==1){
    player.pauseVideo();
  }else{
    player.playVideo();
  }
}

</script>

</body>
</html>
