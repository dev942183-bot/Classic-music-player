 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Music YouTube Integrated</title>
    <style>
        :root {
            --bg-color: #12002b;
            --accent-color: #bc13fe;
            --card-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #1a0033 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
        }

        .phone {
            width: 360px;
            height: 740px;
            background: var(--bg-color);
            border-radius: 40px;
            border: 8px solid #333;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; color: #ff00cc; }

        /* Search */
        .search {
            margin: 0 20px 20px;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
        }

        /* Trending Section */
        .section-title { padding-left: 20px; margin-bottom: 10px; }
        #trending-list {
            display: flex;
            gap: 15px;
            padding: 0 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .video-card {
            min-width: 140px;
            background: #2a0055;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(188, 19, 254, 0.3);
        }

        .video-card img { width: 100%; height: 100px; object-fit: cover; }
        .video-card p {
            font-size: 11px;
            padding: 8px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Player Bar */
        .player {
            position: absolute;
            bottom: 70px;
            width: 90%;
            left: 5%;
            background: rgba(60, 0, 120, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent-color); }

        /* Nav */
        .nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="phone">
    <div class="header">
        <div class="logo">D-Music</div>
        <div>⚙️</div>
    </div>

    <div class="search">🔍 Search on YouTube...</div>

    <h3 class="section-title">Trending Now</h3>
    <div id="trending-list">
        <p style="padding: 20px;">Loading songs...</p>
    </div>

    <div class="player">
        <img id="current-art" src="https://via.placeholder.com/50" alt="">
        <div style="flex:1">
            <div id="current-title" style="font-size: 13px; font-weight: bold;">Select a song</div>
            <div style="font-size: 10px; color: #aaa;">YouTube Stream</div>
        </div>
        <div style="font-size: 20px;">⏸ ⏭</div>
    </div>

    <div class="nav">
        <span>🏠</span><span>🎵</span><span>❤️</span><span>👤</span>
    </div>
</div>

<script>
    // আপনার API Key এখানে বসান
    const API_KEY = ' AIzaSyAfJIHop06R94612CGPmMiTByy5hUarL1M'; 
    const query = 'new hindi hit songs 2026';

    async function getYouTubeData() {
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=6&q=${query}&type=video&key=${API_KEY}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            const list = document.getElementById('trending-list');
            list.innerHTML = ''; // Clear loading text

            data.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <img src="${item.snippet.thumbnails.medium.url}" onclick="playSong('${item.snippet.title}', '${item.snippet.thumbnails.default.url}')">
                    <p>${item.snippet.title}</p>
                `;
                list.appendChild(card);
            });
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('trending-list').innerHTML = "Failed to load API.";
        }
    }

    function playSong(title, img) {
        document.getElementById('current-title').innerText = title;
        document.getElementById('current-art').src = img;
    }

    getYouTubeData();
</script>

</body>
</html>
