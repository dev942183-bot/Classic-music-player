 <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Music</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#1a0033,#3a0066);
color:white;
}

.header{
display:flex;
justify-content:space-between;
padding:15px;
font-size:22px;
font-weight:bold;
}

.search{
display:flex;
margin:10px;
}
.search input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
}
.search button{
margin-left:8px;
padding:12px;
border:none;
border-radius:25px;
background:#ff00cc;
color:white;
}

.results{
padding:10px;
}

.card{
background:#2a004d;
margin:10px 0;
padding:10px;
border-radius:15px;
display:flex;
align-items:center;
cursor:pointer;
}
.card img{
width:80px;
border-radius:10px;
margin-right:10px;
}

.player{
position:fixed;
bottom:0;
width:100%;
background:#140026;
padding:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="header">
  <div>D-Music</div>
  <div>⚙️</div>
</div>

<div class="search">
  <input id="searchInput" placeholder="Search song...">
  <button onclick="searchMusic()">Search</button>
</div>

<div class="results" id="results"></div>

<div class="player">
  <div id="nowPlaying">Select a song</div>
  <div id="player"></div>
</div>

<script>

const API_KEY = " AIzaSyAfJIHop06R94612CGPmMiTByy5hUarL1M";

let player;
let ready=false;

function onYouTubeIframeAPIReady(){
  player = new YT.Player('player',{
    height:'0',
    width:'0',
    videoId:'',
    events:{
      'onReady':()=>{ ready=true; }
    }
  });
}

function searchMusic(){
  let q = document.getElementById("searchInput").value;

  fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${q}&maxResults=10&key=${API_KEY}`)
  .then(r=>r.json())
  .then(data=>{

    let results=document.getElementById("results");
    results.innerHTML="";

    data.items.forEach(v=>{
      let id=v.id.videoId;
      let title=v.snippet.title;
      let img=v.snippet.thumbnails.medium.url;

      let div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <img src="${img}">
        <div>${title}</div>
      `;

      div.onclick=()=>{
        if(ready){
          player.loadVideoById(id);
          document.getElementById("nowPlaying").innerText=title;
        }else{
          alert("Player loading...");
        }
      };

      results.appendChild(div);
    });

  });
}

</script>

</body>
</html>
